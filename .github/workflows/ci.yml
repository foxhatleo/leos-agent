name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test batteries + policy boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # tomllib needs 3.11+
      - name: Create private runtime
        run: python3 bin/leos-runtime.py setup --python python3
      - name: Compile all Python
        run: |
          find . -name '*.py' -not -path './.git/*' -not -path './local/*' -print0 \
            | xargs -0 -n1 bin/leos-python -m py_compile
      - name: Validate JSON
        run: |
          find . -name '*.json' -not -path './.git/*' -not -path './local/*' -print0 \
            | xargs -0 -n1 bin/leos-python -c 'import json,sys; json.load(open(sys.argv[1]))'
      - name: Validate rendered policy
        run: bin/leos-python bin/leos-render-policy.py --check
      - name: Test batteries (all must pass)
        run: |
          for t in guard fmt council runner gitignore merge link block inject uninstall runtime seats; do bin/leos-python tests/$t-tests.py; done
      - name: Policy enforced-vs-advisory boundary
        run: bin/leos-python tests/contamination-check.py
      - name: Doctor
        run: bin/leos-python bin/leos-doctor.py
